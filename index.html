<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="public/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tapso - Modern Commerce Operating System for Indian Social Sellers</title>
    <meta name="description" content="Never lose a WhatsApp order again. Tapso is the modern commerce operating system for Instagram and WhatsApp sellers, D2C brands, creators, and freelancers in India. 1-click checkout, UPI automation, and deep analytics." />
    
    <!-- CSS stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-[#051424] text-[#d4e4fa] font-sans antialiased selection:bg-cyan-500/30">
    
    <!-- Navbar Header -->
    <header>
      <nav class="navbar-header" id="navbar">
        <div class="navbar-container" id="navbar-content">
          <!-- Dynamic Navbar injected here -->
        </div>
      </nav>
    </header>

    <main>
      <!-- Hero Section with ThreeJS Background Canvas -->
      <section class="hero-section" id="hero">
        <div id="three-canvas-container">
          <div class="hero-loader" id="hero-canvas-loader">
            <div class="hero-loader-spinner"></div>
            <div class="hero-loader-text">Initializing 3D Node Map...</div>
          </div>
        </div>
        <div class="container" id="hero-content">
          <!-- Dynamic Hero Content injected here -->
        </div>
      </section>

      <!-- Trust Bar Section -->
      <section class="trustbar-section" id="trustbar">
        <div class="container" id="trustbar-content">
          <!-- Dynamic Trust Bar Content injected here -->
        </div>
      </section>

      <!-- Problem Section -->
      <section class="problem-section" id="problem">
        <div class="container" id="problem-content">
          <!-- Dynamic Problem Content injected here -->
        </div>
      </section>

      <!-- Bento Grid Features Section -->
      <section class="features-section" id="features">
        <div class="container">
          <div class="section-header" id="features-header">
            <!-- Dynamic Features Header injected here -->
          </div>
          <div class="features-grid" id="features-grid-content">
            <!-- Dynamic Features Cards injected here -->
          </div>
        </div>
      </section>

      <!-- Storefront Sandbox Customizer Section -->
      <section class="storefront-section" id="storefront">
        <div class="container">
          <div class="section-header" id="storefront-header">
            <!-- Dynamic Store Builder Header injected here -->
          </div>
          <div class="storefront-container" id="storefront-content">
            <!-- Dynamic Sandbox Workspace injected here -->
          </div>
        </div>
      </section>

      <!-- Workflow Timeline Section -->
      <section class="workflow-section" id="workflow">
        <div class="container">
          <div class="section-header" id="workflow-header">
            <!-- Dynamic Workflow Header injected here -->
          </div>
          <div class="workflow-timeline" id="workflow-content">
            <!-- Dynamic Workflow timeline content injected here -->
          </div>
        </div>
      </section>

      <!-- Merchant Analytics Dashboard Section -->
      <section class="analytics-section" id="analytics">
        <div class="container">
          <div class="section-header" id="analytics-header">
            <!-- Dynamic Analytics Header injected here -->
          </div>
          <div class="analytics-dashboard-grid" id="analytics-content">
            <!-- Dynamic Analytics Content injected here -->
          </div>
        </div>
      </section>

      <!-- Testimonials Section -->
      <section class="testimonials-section" id="testimonials">
        <div class="container">
          <div class="section-header" id="testimonials-header">
            <!-- Dynamic Testimonials Header injected here -->
          </div>
          <div class="testimonials-grid" id="testimonials-content">
            <!-- Dynamic Testimonials Cards injected here -->
          </div>
        </div>
      </section>

      <!-- Pricing Section -->
      <section class="pricing-section" id="pricing">
        <div class="container">
          <div class="section-header" id="pricing-header">
            <!-- Dynamic Pricing Header injected here -->
          </div>
          <div class="pricing-grid" id="pricing-content">
            <!-- Dynamic Pricing Tiers injected here -->
          </div>
        </div>
      </section>

      <!-- Final CTA Section -->
      <section class="finalcta-section" id="finalcta">
        <div class="container" id="finalcta-content">
          <!-- Dynamic Final CTA Content injected here -->
        </div>
      </section>
    </main>

    <!-- Footer Section -->
    <footer class="footer-section" id="footer">
      <div class="container" id="footer-content">
        <!-- Dynamic Footer Content injected here -->
      </div>
    </footer>

    <!-- CDN Libraries (Three.js and Lucide Icons) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Static Content Data -->
    <script src="data.js"></script>

    <!-- Client Logic Application Entry -->
    <script src="app.js"></script>
  </body>
</html>
